name: yahaha

# One command — `docker compose up --build` — brings up the whole CP1 stack:
# postgres + redis + minio, a one-shot minio-init (bucket / public-read / seed bundle),
# then web (Next.js) gated on the seed being present.
#
# Dual S3 endpoint is load-bearing: the web container reaches MinIO at the in-network
# host `minio:9000` (S3_ENDPOINT), but bakes the browser-reachable `localhost:9000`
# (S3_PUBLIC_ENDPOINT) into Play URLs. Do NOT collapse them.

services:
  db:
    # digest-pinned for reproducible `docker compose up` (MED-3 / Fatal #5)
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: yahaha
      POSTGRES_PASSWORD: yahaha
      POSTGRES_DB: yahaha
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yahaha -d yahaha"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z # pinned for reproducible `docker compose up` (Fatal #5)
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Broadly-supported CORS for future client-side fetch (manifest/integrity). Not needed for
      # the CP1 happy path (iframe nav + same-origin-within-frame + server-side manifest validate).
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000"
    ports:
      - "9000:9000" # S3 API — the cross-origin artifact/sandbox source
      - "9001:9001" # console (minioadmin / minioadmin)
    volumes:
      - minio-data:/data

  minio-init:
    # digest-pinned (mc ~2025-08-06) — its tag scheme is ambiguous; digest is reproducible (Fatal #5)
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    volumes:
      - ./seed:/seed:ro
      - ./docker/minio-init.sh:/scripts/minio-init.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      S3_BUCKET: yahaha
    entrypoint: ["/bin/sh", "/scripts/minio-init.sh"]

  # 一次性：迁移 + 插预制游戏 + **真跑一次 Create 流水线**产第 3 个游戏并发布（builder 镜像含 prisma CLI + tsx）。
  # 故 seed 需 MinIO 写入（PACKAGER putObject）+ redis（runGeneration 发 SSE 事件，无订阅者也无害）。web gated 其后。
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://yahaha:yahaha@db:5432/yahaha?schema=public
      # dual endpoint：PACKAGER putObject 走内网 minio:9000；coverUrl/manifestUrl 烧录 localhost:9000（浏览器可达）
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: yahaha
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: redis://redis:6379
      MODEL_PROVIDER: mock # seed 恒用确定性 mock → 可复现、离线（不受 .env 的 MODEL_PROVIDER 影响）
    command: ["sh", "-c", "pnpm prisma migrate deploy && pnpm tsx prisma/seed.ts"]

  # 独立 worker 进程：消费 BullMQ 队列跑 6 节点 Agent 流水线（红线④）。
  # 与 seed 同范式（target: builder，含 prisma client + tsx）；与 web 不同进程。
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully # 产物桶就位
      seed:
        condition: service_completed_successfully # DB schema 就位（migrate 在 seed 里跑）
    environment:
      NODE_ENV: production
      # dual endpoint：putObject 走内网 minio:9000；manifest/entryUrl/coverUrl 烧录 localhost:9000（浏览器可达）
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: yahaha
      S3_FORCE_PATH_STYLE: "true"
      DATABASE_URL: postgresql://yahaha:yahaha@db:5432/yahaha?schema=public
      REDIS_URL: redis://redis:6379
      # 模型 seam：缺省 mock，无 key 也能离线复现整条流水线（Fatal #3/#5）。填 MODEL_* 即切真实模型。
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-5.5}
      VISION_MODEL_NAME: ${VISION_MODEL_NAME:-}
    command: ["pnpm", "tsx", "src/worker/index.ts"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy # web 入队 BullMQ 需 redis 就位
      minio-init:
        condition: service_completed_successfully # bucket + Play 产物就位
      seed:
        condition: service_completed_successfully # DB schema + 预制数据就位
    environment:
      NODE_ENV: production
      # dual endpoint — server uses the service name, browser uses localhost
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: yahaha
      S3_FORCE_PATH_STYLE: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://yahaha:yahaha@db:5432/yahaha?schema=public
      REDIS_URL: redis://redis:6379
      # NextAuth：本地 demo 用 dev secret（非真密钥；可被 .env 覆盖）。AUTH_TRUST_HOST 防 UntrustedHost。
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-not-for-production-change-me-0000}
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "3000:3000"

volumes:
  db-data:
  minio-data:

# pnpm 11 gates package build scripts by default. Allow these native postinstalls:
#   sharp           — optional next/image image optimizer
#   unrs-resolver   — eslint import resolver used by eslint-config-next
#   esbuild         — tsx 的运行时（seed 脚本用）
#   prisma/@prisma  — 生成 client + 下载 query/migration 引擎
# 扁平 node_modules：让 node_modules/.prisma + @prisma/client 成为稳定顶层路径，
# 供 Dockerfile 显式 COPY Prisma 引擎进 standalone runner（pnpm 11 此设置在此处，非 .npmrc）。
nodeLinker: hoisted

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
